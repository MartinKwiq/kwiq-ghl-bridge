<!--
  Kwiq wordmark horizontal · lockup "isotipo + texto Kwiq".

  El componente <Logo variant="wordmark"> compone en runtime el isotipo
  (kwiq-mark.svg) + la palabra "Kwiq" en Antonio, así que este archivo
  se mantiene como fallback estático para casos donde haga falta un SVG
  único (emails HTML, open graph, etc.).

  Para el lockup "block" de marca con fondo petrol (versión redes/hero),
  usá directamente /kwiq-logo-full.svg.
-->
